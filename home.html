        <script>
            function penanggalan() {
                const today = new Date();
                let hari = today.getDate();
                let bulan = today.getMonth();
                let tahun = today.getFullYear();
                let jam = today.getHours();
                let menit = today.getMinutes();
                if (jam>15) {haript=hari} else {haript=hari-1;}
                bulan = bulan+1;
                jampt = jam-15;
                jam = cek(jam);
                menit = cek(menit);
                jampt = cek(jampt);
                hari = cek(hari);
                bulan = cek(bulan);
                haript = cek(haript);

                document.getElementById('pt').innerHTML = haript + "/" + bulan + "/" + tahun + " "+"|"+ " " + jampt+":"+menit;

                setTimeout(penanggalan, 60000);
            }
            
            function cek(i) {
